name: Project E — CI

on:
  push:
    branches: [main, master]
    paths:
      - "project-e-rag-mlops/**"
  pull_request:
    branches: [main, master]
    paths:
      - "project-e-rag-mlops/**"

defaults:
  run:
    working-directory: project-e-rag-mlops

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: project-e-rag-mlops/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check src scripts tests

      - name: Pytest
        run: pytest
        env:
          OPENAI_API_KEY: ""

# Langfuse self-hosted tracing stack (local development)
#
# Usage:
#   docker compose -f docker-compose.langfuse.yml up -d
#   open http://localhost:3000   # create account, note public/secret keys
#
# Then set in .env:
#   LANGFUSE_TRACING=true
#   LANGFUSE_PUBLIC_KEY=pk-lf-...
#   LANGFUSE_SECRET_KEY=sk-lf-...
#   LANGFUSE_HOST=http://localhost:3000
#
# Tear down (data preserved in volume):
#   docker compose -f docker-compose.langfuse.yml down
# Tear down with data wipe:
#   docker compose -f docker-compose.langfuse.yml down -v

version: "3.8"

services:
  langfuse-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://langfuse:langfuse@langfuse-db:5432/langfuse"
      NEXTAUTH_URL: "http://localhost:3000"
      # Change both values below before sharing this compose file publicly.
      # They can be any long random string (e.g. openssl rand -hex 32).
      NEXTAUTH_SECRET: "dev-nextauth-secret-change-me"
      SALT: "dev-salt-change-me"
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"

volumes:
  langfuse_db_data:
